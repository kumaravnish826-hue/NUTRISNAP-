workflows:
  android-app-build:
    name: Build Android APK
    max_build_duration: 120
    instance_type: mac_mini_m1
    environment:
      node: v20.11.1
      java: 17
    triggering:
      events:
        - push
    scripts:
      - name: Install npm dependencies
        script: npm install
      - name: Build Web App
        script: npm run build
      - name: Sync Capacitor Android
        script: npx cap sync android
      - name: Build Android Debug APK
        script: |
          cd android
          chmod +x ./gradlew
          ./gradlew assembleDebug
          
      # Uncomment the below lines if you want to build a Release APK in the future
      # - name: Build Android Release APK
      #   script: |
      #     cd android
      #     chmod +x ./gradlew
      #     ./gradlew assembleRelease
    
    artifacts:
      # This captures the generated APK so you can download it from Codemagic
      - android/app/build/outputs/**/*.apk

