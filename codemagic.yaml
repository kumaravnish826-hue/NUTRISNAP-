workflows:
  android-workflow:
    name: Android Capacitor Build
    environment:
      node: "22"
      java: 17
    triggering:
      events:
        - push
    scripts:
      - name: Install npm dependencies
        script: npm install
      - name: Build web app
        script: npm run build
      - name: Sync Capacitor
        script: npx cap sync android
      - name: Build Android App (Debug APK)
        script: |
          cd android
          chmod +x ./gradlew
          rm -rf .gradle
          ./gradlew --version
          ./gradlew assembleDebug
    artifacts:
      - android/app/build/outputs/**/*.apk
